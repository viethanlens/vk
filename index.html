    <script>
        window.addEventListener('DOMContentLoaded', function() {
      document.body.addEventListener('click', function(e) {
        let path = e.composedPath ? e.composedPath() : (e.path || []);
        for (let el of path) {
          if (!el || !el.getAttribute) continue;
          if (
            el.getAttribute('aria-label') === 'Trò chuyện trên Messenger' ||
            el.title === 'Messenger' ||
            (el.tagName === 'SPAN' && el.textContent.trim().toLowerCase() === 'messenger')
          ) {
            window.open('https://m.me/749430138445818', '_blank');
            e.preventDefault();
            return false;
          }
        }
      }, true);
    });

    <script>
        const pros_daban = [
      {
        name: "LENS GRAY",
        alias: "lens-dang-tu-nhien",
        image: "ventus_blue1.png",
        pro_dir: "2025/07/01"

      },
      {
        name: "CLEAR LENS",
        alias: "lens-trong-suot",
        image: "sandy_socola1.png",
        pro_dir: "2025/07/01"
      }
    ];
    const baseUrl = 'https://sihy.vn/';

    function fisherYates(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const collection = fisherYates(pros_daban.map(pro => {
      const imgSrc = `${baseUrl}upload/img/products/${pro.pro_dir}/${pro.image}`;
      const link = `${baseUrl}${pro.alias}.html`;
      return `
        <a href="${link}" class="jas-sale-pop-img inline-block align-top">
         
        </a>
        <div class="jas-sale-pop-content">
          <h3><a href="${link}">${pro.name}</a></h3>
          <span class="jas-sale-pop-timeago"></span>
        </div>
        <span class="pe-7s-close">&times;</span>
      `;
    }));

    function SalesPop() {
      const pop = document.querySelector('.jas-sale-pop');
      if (!pop) return;

      const times = Array.from({ length: 59 }, (_, i) => `${i + 1} phút`);
      setInterval(() => {
        const randomProduct = collection[Math.floor(Math.random() * collection.length)];
        const timeAgo = times[Math.floor(Math.random() * times.length)];
        pop.innerHTML = randomProduct;
        const timeElem = pop.querySelector('.jas-sale-pop-timeago');
        if (timeElem) timeElem.textContent = `Khách vừa đặt 
        ${timeAgo}`;
        pop.style.display = 'block';
        pop.classList.add('slideUp');

        const closeBtn = pop.querySelector('.pe-7s-close');
        if (closeBtn) {
          closeBtn.addEventListener('click', () => pop.remove());
        }
      }, 6000);
    }

    document.addEventListener('DOMContentLoaded', function () {
      if (window.innerWidth >= 220) {
        SalesPop();
      }
    });
    </script>
